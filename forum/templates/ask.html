{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <h2>Задать вопрос</h2>

        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Заголовок</label>
                <input type="text" name="title" class="form-control"
                       placeholder="О чем ваш вопрос? Будьте конкретны." required minlength="10">
                <small class="text-muted">Минимум 10 символов</small>
            </div>

            <div class="mb-3">
                <label class="form-label">Описание</label>
                <textarea name="body" class="form-control" rows="10"
                          placeholder="Опишите вашу проблему подробно..." required></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Теги (через запятую)</label>
                <input type="text" name="tags" class="form-control"
                       placeholder="python, flask, sql">
                <small class="text-muted">Например: python, flask, sql (максимум 5 тегов)</small>
            </div>

            <button type="submit" class="btn btn-primary">Опубликовать вопрос</button>
            <a href="{{ url_for('index') }}" class="btn btn-secondary">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
